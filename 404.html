<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada - Fubá São Lucas</title>
  <link rel="icon" type="image/png" href="assets/favicon-small.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #FAF6F0;
      color: #2C1810;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 480px; }
    h1 {
      font-size: 5rem;
      font-weight: 300;
      color: #D4A017;
      line-height: 1;
      margin-bottom: 12px;
    }
    h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      font-size: 1rem;
      color: #8B6F47;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: #D4A017;
      color: #2C1810;
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.3s;
    }
    a:hover { background: #E8C547; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Página não encontrada</h2>
    <p>A página que você procura não existe ou foi movida.</p>
    <a href="/">Voltar ao Início</a>
  </div>
</body>
</html>
